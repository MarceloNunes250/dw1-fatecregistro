<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Aroma - Os Melhores Cafés Especiais</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Header -->

    <header class="header">
        <div class="container">
            <div class="nav">
                <div class="logo">
                    Café Aroma
                </div>
                <nav class="menu">
                    <a href="#home">Inicio</a>
                    <a href="#produtos">Produtos</a>
                    <a href="#sobre">Sobre</a>
                    <a href="#contato">contato</a>

                </nav>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
     <section class="hero-section">
        <div class="hero-content">
            <h1>Desperte Seus Sentidos</h1>
            <p>Cafés especiais selecionados para começar o dia com eneriga e sabor</p>
             <button class="btn-primary">Conheça Nossos Cafés</button>
        </div>
        <!-- Botão CTA (Call to action) -->
        
     </section>

     <!-- Seção de Produtos -->
    
     <section id="produtos" class="produtos">
        <div class="container">
            <h2>Nossos Cafés</h2>

            <!-- Cards de Produtos -->

            <div class="card">
                <img src="https://images.unsplash.com/photo-1559056199-641a0ac8b55e?w=400&h=300&fit=crop" alt="Café Expresso">
                <div class="card-content">
                <h3>Expresso Intenso</h3>
                <p>Sabor marcante e encorpado, perfeito para quem aprecia café forte</p>
                <span class="preco">R$ 18,90</span>
              </div>
            </div>
        </div>

     </section>

</body>
</html>
