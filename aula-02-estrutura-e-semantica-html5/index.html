<!-- Estrutura básica HTML -->
<!doctype html>
<!-- Diz ao navegador para utilizar a última versão do HTML -->
<html lang="pt-br">
  <!-- Atributo Lang informa o idioma do site -->
  <!-- No head irão as metatags(metadados - informações do site) -->
  <head>
    <!-- charset indica o conjunto de caracteres -->
    <meta charset="UTF-8" />
    <!-- permite apresentar uma melhor vizualização em dispositivos móveis -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Titulo exibido na barra do navegador -->
    <title>Meu website</title>
  </head>
  <!-- conteúdo do site - o que o usúario irá vizualizar -->
  <body>
    <h1>Meu site</h1>
    <p>Bem-vindo ao meu site</p>
  </body>
</html>
